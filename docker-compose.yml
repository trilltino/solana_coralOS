# Agent Economy on CoralOS — single track, stock coral-server.
#
#   docker compose up -d coral bridge  # start coral-server + the human-checkout bridge
#   cd examples/agent-economy/autonomous && npm start   # kick off the agent↔agent loop
#   open http://localhost:3010         # human checkout (Phantom) — served by the bridge
#
# coral-server here is a PURE MCP coordinator (wallet-free config). It launches
# seller-agent / buyer-agent / user-proxy as containers per session, via the Docker socket.
# Payments are settled agent-side in SOL — coral-server never holds a keypair.
#
# Prereq: build the agent images once so coral can launch them:
#   bash build-agents.sh seller && bash build-agents.sh buyer
#   docker build -t user-proxy:0.1.0 coral-agents/user_proxy

services:

  # ── CoralOS — MCP bus that launches the agents per session ──────────────────
  coral:
    image: ghcr.io/coral-protocol/coral-server:latest
    container_name: coral
    ports:
      - "5555:5555"
    environment:
      - CONFIG_FILE_PATH=/config/coral.toml
      # Passed through to the agents coral launches:
      - SELLER_WALLET=${WALLET}
      - PRICE_SOL=${PRICE_SOL:-0.0001}
      - SERVICE=${SERVICE:-jupiter}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - HELIUS_API_KEY=${HELIUS_API_KEY}
      - JUPITER_API_KEY=${JUPITER_API_KEY}
      - NEWS_API_KEY=${NEWS_API_KEY}
      - BUYER_KEYPAIR_B58=${BUYER_KEYPAIR_B58}
      - BUYER_MAX_SOL=${BUYER_MAX_SOL:-0.001}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./examples/agent-economy/config/coral.toml:/config/coral.toml:ro
      - ./coral-agents:/agents:ro
    restart: unless-stopped

  # ── Human front door — puppet bridge that injects orders as user-proxy ──────
  bridge:
    build: ./examples/agent-economy/bridge
    container_name: bridge
    ports:
      - "3010:3010"
    environment:
      - CORAL_SERVER_URL=http://coral:5555
      - CORAL_TOKEN=dev
      - SELLER_WALLET=${WALLET}
      - PRICE_SOL=${PRICE_SOL:-0.0001}
      - SERVICE=${SERVICE:-jupiter}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BUYER_KEYPAIR_B58=${BUYER_KEYPAIR_B58}   # for the autonomous demo viewer
      - BUYER_MAX_SOL=${BUYER_MAX_SOL:-0.001}
    depends_on:
      - coral
    restart: unless-stopped
    # The bridge self-serves the Phantom checkout UI at http://localhost:3010.
