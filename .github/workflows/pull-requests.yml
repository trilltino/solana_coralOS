name: Pull requests

on:
  pull_request:

jobs:
  # ── TypeScript SDK (typescript/packages/solana-pay/core/) ──
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./typescript

    name: Lint, format, and typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: current

      - name: Install Dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter @solana/pay lint

      - name: Typecheck
        run: pnpm --filter @solana/pay typecheck

  unit-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./typescript

    strategy:
      matrix:
        node:
          - "current"
          - "lts/*"

    name: Run unit tests on Node ${{ matrix.node }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install Dependencies
        run: pnpm install

      - name: Run unit tests
        run: pnpm --filter @solana/pay test

  # ── Rust CLI (rust/) ──
  cli-check:
    name: CLI check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./rust

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Format
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
