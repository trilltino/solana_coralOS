name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # ---------------------------------------------------------------------------
  # Plan: extract version from tag
  # ---------------------------------------------------------------------------
  plan:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Build: matrix of platform-specific binaries
  # ---------------------------------------------------------------------------
  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --locked
          else
            cargo build --release --target ${{ matrix.target }} --locked
          fi
        shell: bash

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          ARTIFACT="pay-${{ matrix.target }}.tar.gz"
          BIN="target/${{ matrix.target }}/release/pay"
          chmod +x "$BIN"
          tar czf "$ARTIFACT" -C "target/${{ matrix.target }}/release" pay
          shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "pay-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/pay.exe" -DestinationPath $artifact
          $hash = (Get-FileHash -Algorithm SHA256 $artifact).Hash.ToLower()
          "$hash  $artifact" | Out-File -Encoding ascii "$artifact.sha256"
          "ARTIFACT=$artifact" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            pay-${{ matrix.target }}.*

  # ---------------------------------------------------------------------------
  # Release: create GitHub Release with all artifacts
  # ---------------------------------------------------------------------------
  release:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.plan.outputs.version }}
          name: v${{ needs.plan.outputs.version }}
          prerelease: ${{ needs.plan.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            pay-*.tar.gz
            pay-*.tar.gz.sha256
            pay-*.zip
            pay-*.zip.sha256

  # ---------------------------------------------------------------------------
  # Publish: npm (stable releases only)
  # ---------------------------------------------------------------------------
  npm-publish:
    needs: [plan, release]
    if: needs.plan.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set version
        working-directory: npm
        run: npm version "${{ needs.plan.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
