# coral-server local-dev config.
# Loaded via CONFIG_FILE_PATH=/config/config.toml (see docker-compose.yml).

[auth]
# API keys accepted as `Authorization: Bearer <key>`.
keys = ["dev"]

[network]
# Dev only: relax CORS so the Tauri app / browser console can call in.
allowAnyHost = true

[registry]
# Scan mounted /agents/* for directories containing a coral-agent.toml.
# helius-monitor lives at /agents/helius_monitor/coral-agent.toml.
localAgents = ["/agents/*"]
includeCoralHomeAgents = true
# Re-scan every 5s so newly added agents appear without a restart.
localAgentRescanTimer = "5s"

[docker]
# coral-server runs inside a Linux container, so its isWindows() check is false
# and it would default this to 172.17.0.1 — which is NOT reachable from the
# sibling agent containers on Docker Desktop. host.docker.internal IS reachable
# (verified), so pin it explicitly. This is the address baked into the agents'
# CORAL_CONNECTION_URL.
address = "host.docker.internal"
